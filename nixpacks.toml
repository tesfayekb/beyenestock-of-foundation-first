# Railway build configuration — forces Python provider, prevents Node/Bun detection
# Last updated: 2026-04-22 (cache bust)
providers = ["python"]

[phases.setup]
nixPkgs = ["python311"]

[phases.install]
cmds = ["pip install -r backend/requirements.txt"]

[start]
cmd = "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
